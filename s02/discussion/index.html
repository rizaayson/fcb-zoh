<!DOCTYPE html>
<html>

	<title>HTML Introduction</title>
</head>
<body>

	<!-- Comments are useful for documentation and help developers understand the code better. -->

	<!-- creates a heading text -->

	<br>
	Let's enumerate all the things that we will study in this Free Coding Bootcamp.</p>

</body>
</html>
